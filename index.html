<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수마샵 예약!</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, select {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      background: #ff6b00;
      color: white;
      border: none;
      padding: 12px;
      width: 95%;
      border-radius: 10px;
      font-size: 16px;
    }

    h1 {
      color: #ff6b00;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1> 수마샵 </h1>
    <h3>예약하기</h3>

    <form onsubmit="submitForm(event)">
      <input type="text" placeholder="이름" required><br>
      <input type="time" required><br>

      <select>
        <option>프리미엄 FULL COURSE</option>
        <option>울트라 프리미엄 FULL COURSE</option>
        <option>울트라 프리미엄 FULL COURSE PLUS</option>
      </select><br>

      <button type="submit">예약하기</button>
    </form>

    <h2 id="result"></h2>
  </div>

  <script>
    function submitForm(e){
      e.preventDefault();
      document.getElementById("result").innerText = "예약 완료! 🎉";
    }
  </script>

</body>
</html>
